<!DOCTYPE html>

<html>
  <head>
    <title>YouTube.com clone</title>
    <link rel="stylesheet" href="youtube.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>

  <body>
    <input id="search" class="search" type="text" placeholder="Search">

    <div class="video-preview">
      <div>
        <img class="preview" src="thumbnails/thumbnail-1.webp" alt="logo">
      </div>

      <div class="video-info-grid">
        <div class="logo">
            <img class="channel" src="channel-pics/channel-1.jpeg" alt="logo">
        </div>

        <div>

          <p class="description-para">
            Talking Tech Ai with Google CEO Sundar Pichai!
          </p>

          <p class="author-para">
              Marques Brownlee
          </p>

          <p class ="stats-para">
              3.4M views &middot; 6 month ago
          </p>

        </div>

      </div>

    
    </div>

    <div class="video-preview">

      <div>
        <img class="preview" src="thumbnails/thumbnail-2.webp" alt="preview">
      </div>

      <div class="video-info-grid">
        <div class="logo">
            <img class="channel" src="channel-pics/channel-2.jpeg" alt="logo" >
        </div>

        <div>
          <p class="description-para">
            Try NOT to Laugh Challenge #9
          </p>

          <p class="author-para">
              Markiplier
          </p>

          <p class ="stats-para">
              19M views &middot; 4 years ago
          </p>
        </div>

      </div>
    

    </div>


  </body>
</html>
